<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cool bao — Personal CV & Project Wall">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08080C"/>
      <stop offset="0.55" stop-color="#0E0B1F"/>
      <stop offset="1" stop-color="#160F33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 70) rotate(120) scale(420 420)">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#5B3CE6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5B3CE6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(120 380) rotate(-50) scale(360 360)">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="80" y1="150" x2="640" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#E9E4FF"/>
      <stop offset="1" stop-color="#B9A6FF"/>
    </linearGradient>
    <linearGradient id="accentline" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#6366F1"/>
      <stop offset="0.6" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="logo" x1="80" y1="92" x2="156" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1280" height="400" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#dots)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>

  <!-- faint vertical guide lines, right side -->
  <g stroke="#FFFFFF" stroke-opacity="0.04">
    <line x1="880" y1="0" x2="880" y2="400"/>
    <line x1="980" y1="0" x2="980" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1180" y1="0" x2="1180" y2="400"/>
  </g>

  <!-- soft orb, top right -->
  <circle cx="1060" cy="120" r="70" fill="#8B5CF6" fill-opacity="0.25" filter="url(#soft)"/>
  <circle cx="1060" cy="120" r="46" fill="none" stroke="#C4B5FD" stroke-opacity="0.35" stroke-width="1.2"/>
  <circle cx="1060" cy="120" r="78" fill="none" stroke="#8B5CF6" stroke-opacity="0.18" stroke-width="1"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accentline)"/>

  <!-- logo monogram tile -->
  <rect x="80" y="92" width="76" height="76" rx="20" fill="url(#logo)"/>
  <rect x="80" y="92" width="76" height="76" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
  <text x="118" y="146" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">Cb</text>

  <!-- eyebrow -->
  <text x="182" y="116" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="4" fill="#A78BFA">PERSONAL&#160;&#160;CV&#160;&#160;&#183;&#160;&#160;PROJECT&#160;&#160;WALL</text>

  <!-- title -->
  <text x="180" y="170" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif" font-size="58" font-weight="700" letter-spacing="-1" fill="url(#title)">Cool bao</text>

  <!-- subtitle -->
  <text x="82" y="232" font-family="'DM Sans','Segoe UI',Helvetica,Arial,sans-serif" font-size="22" font-weight="400" fill="#C7C7D1">A self-hosted portfolio &amp; project wall — edit content visually, ship instantly.</text>

  <!-- stack line -->
  <text x="82" y="266" font-family="'DM Sans','Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="500" letter-spacing="0.5" fill="#7E7E8F">Magic Portfolio &#215; TinaCMS &#160;&#183;&#160; Deployed on Vercel</text>

  <!-- tech pills -->
  <g font-family="'DM Sans','Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="500">
    <g>
      <rect x="82" y="300" width="116" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="106" cy="319" r="4" fill="#FFFFFF"/>
      <text x="120" y="324" fill="#E6E6EE">Next.js 16</text>
    </g>
    <g>
      <rect x="210" y="300" width="108" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="234" cy="319" r="4" fill="#34E5C4"/>
      <text x="248" y="324" fill="#E6E6EE">TinaCMS</text>
    </g>
    <g>
      <rect x="330" y="300" width="98" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="354" cy="319" r="4" fill="#000000" stroke="#FFFFFF" stroke-width="1"/>
      <text x="368" y="324" fill="#E6E6EE">Vercel</text>
    </g>
    <g>
      <rect x="440" y="300" width="124" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="464" cy="319" r="4" fill="#3B82F6"/>
      <text x="478" y="324" fill="#E6E6EE">TypeScript</text>
    </g>
    <g>
      <rect x="576" y="300" width="104" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="600" cy="319" r="4" fill="#A78BFA"/>
      <text x="614" y="324" fill="#E6E6EE">Once UI</text>
    </g>
  </g>

  <!-- right-side mono tag -->
  <text x="1198" y="372" text-anchor="end" font-family="'DM Mono','SFMono-Regular',Consolas,monospace" font-size="13" fill="#5A5A6B">// Calgary, Canada &#183; localhost:7931</text>
</svg>
